name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new push lands -- avoids
# multiple parallel runs from rapid pushes burning CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ruff + ty + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pinning a uv version keeps CI deterministic across uv releases.
          version: "0.9.4"
          # Cache uv's download + venv directories so re-runs are fast.
          enable-cache: true

      - name: Install Python 3.14 (managed by uv)
        run: uv python install 3.14

      - name: Install project + dev dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format --check)
        run: uv run ruff format --check

      - name: Type check (ty)
        run: uv run ty check

      - name: Run tests (pytest)
        run: uv run pytest -ra
