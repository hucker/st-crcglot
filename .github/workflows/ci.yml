name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new push lands -- avoids
# multiple parallel runs from rapid pushes burning CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ruff + ty + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pinning the uv version keeps CI deterministic across uv releases.
          version: "0.9.4"
          enable-cache: true

      - name: Install Python 3.14 (managed by uv)
        run: uv python install 3.14

      - name: Install project + dev dependencies
        run: uv sync --all-extras --dev

      - name: ruff check (lint)
        run: uv run ruff check

      - name: ruff format --check
        run: uv run ruff format --check

      - name: ty check (typecheck)
        run: uv run ty check

      - name: pytest
        run: uv run pytest -ra

      # The README badges are read from .badges/*.json on main, and a
      # contributor is expected to regenerate them before pushing:
      #
      #   uv run python scripts/update_badges.py
      #
      # This step re-runs the same script in --check mode and fails the
      # build if the committed badges don't match what the tools just
      # reported.  That keeps the README's badge row honest: a green
      # status on GitHub guarantees the .badges/ JSON on main reflects
      # the latest tool output.
      - name: Verify .badges/ in sync
        run: uv run python scripts/update_badges.py --check
